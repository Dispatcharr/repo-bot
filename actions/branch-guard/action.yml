name: 'Branch Guard'
description: 'Checks that a PR targets an allowed branch'
inputs:
  github-token:
    description: 'Bot installation token with Pull requests read/write permission'
    required: true
  allowed-targets:
    description: 'Comma-separated allowed target branch patterns. Supports * (single segment) and ** (multi-segment) wildcards.'
    required: true
  enforcement:
    description: 'Action to take when the target branch is not allowed: close, lock, close-and-lock, comment-only'
    required: false
    default: 'comment-only'
  lock-reason:
    description: 'Reason used when locking (off-topic, too heated, resolved, spam). Only applies when enforcement includes lock.'
    required: false
    default: 'off-topic'
  bypass-for-members:
    description: 'If true, skip enforcement when the PR author is a repository collaborator'
    required: false
    default: 'false'
  comment:
    description: 'Comment to post when the check fails. {target-branch} is replaced with the actual base branch name.'
    required: false
    default: ''
runs:
  using: 'node24'
  main: 'dist/index.js'
